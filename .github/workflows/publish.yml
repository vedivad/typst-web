name: Publish npm packages

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run build

      - name: Run tests
        run: bun run test

      - name: Rewrite workspace dependencies
        run: |
          VERSION=$(node -p "require('./packages/typst-web-service/package.json').version")
          cd packages/codemirror-typst && npm pkg set "dependencies.@vedivad/typst-web-service=^${VERSION}"

      - name: Publish @vedivad/typst-web-service
        run: npm publish --workspace packages/typst-web-service --access public --provenance

      - name: Publish @vedivad/codemirror-typst
        run: npm publish --workspace packages/codemirror-typst --access public --provenance
